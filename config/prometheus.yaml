global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'faas-hot-runtime'
    static_configs:
      - targets: ['faas-hot-runtime:8080']
    metrics_path: /metrics
    scheme: http

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']