version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    versioning-strategy: increase
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-minor

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: America/Chicago
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-minor
